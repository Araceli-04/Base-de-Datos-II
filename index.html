<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Academico | Jihomara Medrano</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500;1,600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --main-pink: #f48fb1;
            --dark-pink: #d81b60;
            --soft-pink: #ffebf2;
            --text-color: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #f0f4ff 100%);
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .course-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem; font-weight: 600; font-style: italic;
            letter-spacing: 2px; color: var(--main-pink);
        }

        /* BOTÓN DE LOGIN AGREGADO */
        .login-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            padding: 8px 20px;
            background: var(--main-pink);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            border-radius: 50px;
            letter-spacing: 1px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(244, 143, 177, 0.2);
        }

        .login-btn:hover {
            background: var(--dark-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 143, 177, 0.3);
        }

        /* HERO */
        .hero { padding: 60px 20px; text-align: center; }
        .hero h2 { 
            font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight: 300; font-style: italic; color: #333;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }

        /* UNIT SECTION */
        .unit-card {
            background: var(--glass);
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 60px;
            border: 1px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        .unit-header { margin-bottom: 30px; border-left: 5px solid var(--main-pink); padding-left: 20px; }
        .unit-label { font-size: 0.7rem; font-weight: 800; color: var(--main-pink); letter-spacing: 3px; }
        .unit-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-style: italic; }

        /* GRID INTERACTIVO */
        .weeks-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px; 
        }

        /* CARD MEJORADA */
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            position: relative;
            transition: var(--transition);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
            cursor: pointer;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(244, 143, 177, 0.15);
            border-color: var(--main-pink);
        }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: var(--main-pink);
            transform: scaleX(0);
            transition: var(--transition);
            transform-origin: left;
        }

        .card:hover::before { transform: scaleX(1); }

        .card-icon {
            background: var(--soft-pink);
            width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: var(--main-pink);
            margin-bottom: 20px;
        }

        .card-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem; font-weight: 600; color: #bbb;
        }

        .card-topic {
            font-size: 1rem; font-weight: 700; color: #444;
            margin: 10px 0; line-height: 1.3;
        }

        .btn-enter {
            margin-top: 20px;
            padding: 12px;
            border-radius: 20px;
            background: var(--soft-pink);
            color: var(--main-pink);
            text-align: center;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .card:hover .btn-enter {
            background: var(--main-pink);
            color: white;
        }

        /* ESTADO INACTIVO */
        .card.inactive {
            opacity: 0.6;
            filter: grayscale(1);
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .unit-card { padding: 25px; }
            .weeks-grid { grid-template-columns: 1fr; }
            .login-btn span { display: none; } /* En móviles solo queda el icono */
        }
    </style>
</head>
<body>

<nav class="navbar">
    <img src="img/LogoUpla.png" height="35" alt="UPLA">
    <h1 class="course-title">Base de Datos II</h1>
    <a href="login.html" class="login-btn">
        <i data-lucide="user-circle" size="18"></i>
        <span>ACCESO</span>
    </a>
</nav>

<header class="hero">
    <h2>Jihomara Araceli Medrano</h2>
    <p style="letter-spacing: 5px; font-size: 0.7rem; color: #999; margin-top: 10px;">INGENIERÍA DE SISTEMAS</p>
</header>

<main class="container" id="app-container"></main>

<script>
    const unitsData = [
        { 
            roman: "I", 
            title: "Introducción a la Arquitectura de B.D.",
            weeks: [
                { title: "Arquitectura de B.D.", icon: "layers" },
                { title: "Gestores de B.D.", icon: "database" },
                { title: "Arquitectura B.D", icon: "cpu" },
                { title: "Diseño de Arquitectura", icon: "pen-tool" }
            ]
        },
        { 
            roman: "II", 
            title: "Pendiente",
            weeks: [
                { title: "Pendiente", icon: "lock" },
                { title: "Pendiente", icon: "lock" },
                { title: "Pendiente", icon: "lock" },
                { title: "Pendiente", icon: "lock" }
            ]
        }
    ];

    const container = document.getElementById('app-container');

    unitsData.forEach((unit, uIdx) => {
        let weeksHtml = '';
        unit.weeks.forEach((week, wIdx) => {
            let weekGlobal = (uIdx * 4) + (wIdx + 1);
            let isActive = uIdx === 0; 
            
            weeksHtml += `
                <div class="card ${isActive ? 'active' : 'inactive'}" onclick="window.location.href='semanas/semana${weekGlobal}.html'">
                    <div>
                        <div class="card-icon">
                            <i data-lucide="${week.icon}"></i>
                        </div>
                        <span class="card-number">Semana 0${weekGlobal}</span>
                        <h4 class="card-topic">${week.title}</h4>
                    </div>
                    <div class="btn-enter">${isActive ? 'Explorar Contenido' : 'Bloqueado'}</div>
                </div>
            `;
        });

        container.innerHTML += `
            <section class="unit-card">
                <div class="unit-header">
                    <span class="unit-label">UNIDAD ${unit.roman}</span>
                    <h3 class="unit-title">${unit.title}</h3>
                </div>
                <div class="weeks-grid">${weeksHtml}</div>
            </section>
        `;
    });

    lucide.createIcons();
</script>

</body>
</html>
