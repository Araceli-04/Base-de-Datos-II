<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Jihomara Medrano</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500;1,600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-pink: #f48fb1;
            --soft-pink: #ffebf2;
            --text-color: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #f9f0ff 100%);
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-color);
        }

        /* NAVBAR */
        .navbar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8);
        }

        .course-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem; font-weight: 600; font-style: italic;
            letter-spacing: 5px; text-transform: uppercase;
            color: var(--main-pink);
        }

        .login-btn {
            text-decoration: none; padding: 10px 25px;
            background: var(--main-pink); color: white;
            font-size: 0.7rem; font-weight: 800; border-radius: 50px;
            letter-spacing: 1px; transition: 0.4s ease;
        }

        /* HERO */
        .hero { padding: 80px 20px 40px; text-align: center; }
        .hero h2 { 
            font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; 
            font-weight: 300; font-style: italic; color: #333; line-height: 0.9;
        }
        .hero p { font-size: 0.7rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #b2b2b2; margin-top: 15px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }

        /* UNIDADES */
        .unit-card {
            background: var(--glass);
            border: 2px solid white;
            border-radius: 50px;
            padding: 50px;
            margin-bottom: 70px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
        }

        .unit-label {
            background: var(--main-pink); color: white;
            padding: 5px 20px; border-radius: 50px;
            display: inline-block; margin-bottom: 15px;
            font-size: 0.8rem; font-weight: 800; letter-spacing: 2px;
        }

        .unit-title { 
            font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; 
            font-style: italic; color: #444; line-height: 1; margin-bottom: 40px;
        }

        .weeks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        /* CARDS */
        .card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 35px; border: 1px solid white;
            display: flex; flex-direction: column;
            transition: 0.4s ease; min-height: 250px; overflow: hidden;
        }

        .card-header {
            padding: 20px; font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem; font-weight: 600; font-style: italic;
            color: var(--main-pink); border-bottom: 1px solid var(--soft-pink);
        }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-body p { font-size: 0.7rem; color: #888; line-height: 1.5; }

        .btn-report {
            display: block; margin: 0 20px 20px; padding: 12px;
            border-radius: 30px; text-align: center; text-decoration: none;
            font-size: 0.6rem; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; transition: 0.3s;
            background: var(--main-pink); color: white;
        }

        .card.inactive { opacity: 0.5; }
        .card.inactive .btn-report { background: #fdf2f5; color: #e1b4c4; pointer-events: none; }

        @media (max-width: 900px) { .weeks-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><img src="img/LogoUpla.png" height="35"></div>
    <h1 class="course-title">Base de Datos II</h1>
    <a href="#" class="login-btn">✦ LOGIN</a>
</nav>

<header class="hero">
    <h2>Jihomara Araceli <br> Medrano Huertas</h2>
    <p>Ingeniería de Sistemas • Portafolio Académico</p>
</header>

<main class="container" id="app-container"></main>

<script>
    const unitsData = [
        { roman: "I", title: "Fundamentos y Modelado" },
        { roman: "II", title: "Diseño Lógico Avanzado" }
    ];

    const container = document.getElementById('app-container');

    unitsData.forEach((unit, index) => {
        let weeksHtml = '';
        for(let i=1; i<=4; i++){
            let weekGlobal = (index * 4) + i;
            let isCompleted = (weekGlobal === 1 || weekGlobal === 2);
            
            let description = "Contenido pendiente de publicación académica.";
            if(weekGlobal === 1) description = "Arquitecturas de Datos y despliegue inicial en GitHub.";
            if(weekGlobal === 2) description = "Manual de Instalación SQL Server y Modelado Entidad Relación.";

            // --- LA RUTA CORREGIDA SEGÚN TU IMAGEN ---
            let path = "semanas/semana" + weekGlobal + ".html";

            weeksHtml += `
                <div class="card ${isCompleted ? 'active' : 'inactive'}">
                    <div class="card-header">Semana ${weekGlobal < 10 ? '0'+weekGlobal : weekGlobal}</div>
                    <div class="card-body">
                        <p>${description}</p>
                    </div>
                    <a href="${path}" class="btn-report">
                        ${isCompleted ? 'Ver Semana' : 'Pendiente'}
                    </a>
                </div>
            `;
        }

        container.innerHTML += `
            <div class="unit-card">
                <div class="unit-label">UNIDAD ${unit.roman}</div>
                <h3 class="unit-title">${unit.title}</h3>
                <div class="weeks-grid">${weeksHtml}</div>
            </div>
        `;
    });
</script>

</body>
</html>
